events {}
http {
    include /etc/nginx/mime.types;
    
    # Load balancing / Upstreaming
    upstream web_backend {
        server web-frontend-server1:80;
        server web-frontend-server2:80;
    }

    upstream app_backend {
        server app-server:8081;
    }

    upstream auth_backend {
        server auth-server:8080;
    }

    server {
        listen 80;
        server_name localhost myminicloud.local;

        # Web Server route
        location / {
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Backend-Server $upstream_addr; # For testing load balancing
        }

        # Application Server API route
        location /api/ {
            proxy_pass http://app_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Authentication Server route
        location /auth/ {
            proxy_pass http://auth_backend/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Student friendly route
        location /student/ {
            proxy_pass http://app_backend/api/student;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health Check route
        location /health {
            proxy_pass http://app_backend/health;
        }
    }
}
