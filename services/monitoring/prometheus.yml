global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus tự scrape chính nó
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter — metrics CPU, RAM, disk của máy host
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # CoreDNS — metrics của DNS server
  - job_name: 'dns-server'
    static_configs:
      - targets: ['dns-server:9153']

  # App Server — scrape health endpoint (basic)
  # Để có metrics chuẩn Prometheus thì cần thêm flask-prometheus-metrics
  - job_name: 'app-server'
    static_configs:
      - targets: ['app-server:8081']
    metrics_path: '/metrics'
